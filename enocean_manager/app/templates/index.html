<!DOCTYPE html>
<html>
<head>
    <title>Gestion EnOcean</title>
</head>
<body>
    <h1>Appareils appairés</h1>
    <ul>
        {% for dev in devices %}
        <li>{{ dev }}</li>
        {% endfor %}
    </ul>

    <h2>Nouvel appairage</h2>
    <form onsubmit="event.preventDefault(); appairer();">
        <label for="target">ID cible (hexadécimal, 4 octets) :</label><br>
        <input type="text" id="target" placeholder="FF,C6,EA,01" required>
        <button type="submit">Appairer</button>
    </form>

    <script>
        function appairer() {
            const id = document.getElementById("target").value.split(',').map(x => parseInt(x, 16));
            fetch('/appairer', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({target_id: id})
            }).then(resp => resp.json()).then(data => alert(JSON.stringify(data)));
        }
    </script>
</body>
</html>
