<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>EnOcean Manager</title>
</head>
<body>
    <h1>🛰️ Gestionnaire EnOcean</h1>
    <button onclick="lancerAppairage()">🔗 Lancer l'appairage automatique</button>
    <div id="resultat"></div>

    <script>
        function lancerAppairage() {
            document.getElementById("resultat").innerText = "⏳ En attente de trame...";
            fetch("/appairer", {
                method: "POST"
            })
            .then(res => res.json().then(data => ({ ok: res.ok, data })))
            .then(({ ok, data }) => {
                if (!ok) throw data;
                document.getElementById("resultat").innerHTML =
                    `✅ Appairé avec l'ID : <code>${data.target_id}</code><br>
                    EEP : ${data.eep_code}<br>
                    Fichier XML : ${data.eep_file}`;
            })
            .catch(err => {
                document.getElementById("resultat").innerHTML =
                    `❌ Erreur lors de l’appairage : <br><pre>${JSON.stringify(err, null, 2)}</pre>`;
            });
        }
    </script>
</body>
</html>
