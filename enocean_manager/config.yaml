name: "EnOcean Manager"
version: "0.0.3c"                      # reste en SemVer strict
slug: "enocean_manager"
description: "Add-on Home Assistant pour gestion avancée EnOcean (profils EEP JSON)"
url: "https://github.com/maximedub/enocean_manager"
arch:
  - aarch64
  - armv7
  - amd64
startup: services
boot: auto
init: false
host_network: true
uart: true                            # <-- donne accès aux ports /dev/tty* à l’add-on
map:
  - config:rw
options:
  serial_port: "/dev/ttyUSB0"
  json_dir: "/data/profile_json"
schema:
  serial_port: str
  json_dir: str
# pas de 'image:' -> build local
