name: "EnOcean Manager"
version: "0.0.7f"
slug: "enocean_manager"
description: "Add-on Home Assistant pour gérer EnOcean à partir de profils EEP JSON."
url: "https://github.com/maximedub/enocean_manager"
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386

# S6 v3 -> init doit être à false (le script run.sh démarre le service)
init: false
startup: services

# Ingress (pas d’ouverture de port externe nécessaire)
ingress: true
ingress_port: 8099
panel_icon: mdi:radio-tower
panel_title: "EnOcean"
uart: true              # map auto des ports série

# Répertoires mappés (persistants)
map:
  - type: data          # /data persistant pour devices.json et EEP JSON
  - data:rw
  - share:rw

# Options exposées à l’UI
options:
  serial_port: "/dev/ttyUSB0"
  json_dir: "/data/profile_json"

schema:
  serial_port: str
  json_dir: str
