name: "EnOcean UTE Teach-In"
version: "0.1.0"
slug: "enocean_ute_teachin"
description: "Service HTTP pour appairer des actionneurs EnOcean via UTE (RORG 0xD4) et enregistrer automatiquement les entités dans Home Assistant."
arch:
  - aarch64
  - amd64
startup: services
boot: auto
host_network: true
ingress: false
ports:
  "8099/tcp": 8099

options:
  serial_port: "/dev/serial/by-id/usb-EnOcean_GmbH_EnOcean_USB_300_DC_FT4T6Q61-if00-port0"
  eep_dir: "/app/profile_json"
  log_level: "INFO"
  listen_timeout: 12            # secondes (mode AUTO)
  manufacturer_id: 65535        # 0xFFFF par défaut (générique)
  write_yaml: true              # écrire packages/enocean_auto.yaml
  reload_on_write: false        # (optionnel) appeler /api/services/homeassistant/reload_core_config via token (non inclus par défaut)

schema:
  serial_port: str
  eep_dir: str
  log_level: list(DEBUG|INFO|WARNING|ERROR)
  listen_timeout: int
  manufacturer_id: int
  write_yaml: bool
  reload_on_write: bool

environment:
  PYTHONUNBUFFERED: "1"

map:
  - config:rw

devices:
  - /dev/ttyUSB0:/dev/ttyUSB0:rwm
  - /dev/serial/by-id/usb-EnOcean_GmbH_EnOcean_USB_300_DC_FT4T6Q61-if00-port0:/dev/serial/by-id/usb-EnOcean_GmbH_EnOcean_USB_300_DC_FT4T6Q61-if00-port0:rwm
usb: true
uart: true

image: "local/enocean_ute_teachin-{arch}"
