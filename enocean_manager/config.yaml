name: "EnOcean Manager"
version: "0.0.5"                 # ↑ bump pour forcer un rebuild
slug: "enocean_manager"
description: "Add-on Home Assistant pour gestion avancée EnOcean (profils EEP JSON)"
url: "https://github.com/maximedub/enocean_manager"
arch:
  - aarch64
  - armv7
  - amd64
startup: services
boot: auto
init: false
host_network: true
uart: true
map:
  - config:rw
options:
  serial_port: "/dev/ttyUSB0"
  json_dir: "/data/profile_json"
schema:
  serial_port: str
  json_dir: str
# ⚠️ NE PAS mettre 'image:' (sinon HA essaie de pull au lieu de build)
