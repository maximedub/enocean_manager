name: Build and publish EnOcean Manager

on:
  push:
    branches:
      - master

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build and Push Docker Image
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (amd64)
        uses: docker/build-push-action@v5
        with:
          context: ./enocean_manager
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/enocean_manager:amd64
          platforms: linux/amd64

      - name: Build and push (armv7)
        uses: docker/build-push-action@v5
        with:
          context: ./enocean_manager
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/enocean_manager:armv7
          platforms: linux/arm/v7

      - name: Build and push (arm64)
        uses: docker/build-push-action@v5
        with:
          context: ./enocean_manager
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/enocean_manager:arm64
          platforms: linux/arm64
